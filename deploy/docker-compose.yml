version: "3.9"

services:
  postgres:
    image: registry.cn-beijing.aliyuncs.com/yhkl/linux_arm64_pgvector:0.8.2-pg18-trixie
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: registry.cn-beijing.aliyuncs.com/yhkl/linux_arm64_redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  sentinel:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        GOPROXY: https://goproxy.cn,direct
    ports:
      - "8080:8080"
    volumes:
      - ../configs:/app/configs:ro
    environment:
      SENTINEL_DATABASE_HOST: postgres
      SENTINEL_DATABASE_PASSWORD: sentinel
      SENTINEL_REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
